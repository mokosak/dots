<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>SpaceMono Nerd Font</family>
      <family>Noto Sans Mono</family>
    </prefer>
  </alias>
  <!-- Spleen is a 1-bit bitmap font: keep it crisp (no AA/hinting blur). -->
  <match target="font">
    <test name="family" compare="contains"><string>Spleen</string></test>
    <edit name="antialias" mode="assign"><bool>false</bool></edit>
    <edit name="hinting" mode="assign"><bool>false</bool></edit>
    <edit name="embeddedbitmap" mode="assign"><bool>true</bool></edit>
  </match>

  <!-- The OTB copy of Spleen (in spleen-otb/) is renamed "SpleenOTB" so Pango apps (dunst)
       can render it. Xft apps (st/dwm) reference plain "Spleen" and keep the crisp .bdf;
       Pango rejects raw .bdf/.pcf but accepts the OpenType-wrapped .otb. -->
  <match target="scan">
    <test name="file" compare="contains"><string>spleen-otb</string></test>
    <edit name="family" mode="assign"><string>SpleenOTB</string></edit>
  </match>
</fontconfig>
